name: 🍄 Generate Mario Contribution World

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:


permissions:
  contents: write


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4


      - name: Generate Contribution Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: abhay-gautam0
          outputs: |
            dist/mario-contribution.svg
            dist/mario-contribution-dark.svg?palette=github-dark


      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
