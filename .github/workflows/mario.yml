name: Generate Racing Contribution

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate racing graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: YOUR_GITHUB_USERNAME
          outputs: |
            dist/racing.svg

      - name: Add racing car effect
        run: |
          sed -i 's/<\/svg>/<text x="20" y="30" font-size="25">🏎️💨 ABHAY CODING CIRCUIT<\/text><\/svg>/' dist/racing.svg

      - name: Push racing graph
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
