name: Generate Mario

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Mario Contribution Graph
        uses: Platane/snk@v3
        with:
          github_user_name: abhay-gautam0
          outputs: |
            dist/github-contribution-grid-mario.svg?color_snake=red&color_dots=#ff0000,#ff6600,#ffcc00,#00cc00,#0000ff&head=mario

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
