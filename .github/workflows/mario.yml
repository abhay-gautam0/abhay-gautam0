name: 🍄 Generate Mario Contribution World

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write


jobs:
  generate:
    name: Build Contribution Animation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Generate Contribution Graph
        uses: Platane/snk@v3
        with:
          github_user_name: abhay-gautam0

          outputs: |
            dist/mario-contribution.svg?palette=github-dark
            dist/mario-contribution-light.svg


      - name: Add Mario Theme
        run: |
          echo "
          🍄 SUPER ABHAY WORLD 🍄
          ⭐ Collecting commits everyday ⭐
          " > dist/README.txt


      - name: Deploy Animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
