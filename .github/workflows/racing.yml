name: Generate Racing Track

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      - name: Generate Racing Track
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: abhay-gautam0
          outputs: |
            dist/racing.svg?palette=github-dark&color_snake=#ff0000&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353


      - name: Add F1 Theme
        run: |
          sed -i 's/<\/svg>/<text x="20" y="20" font-size="20">🚦 START<\/text><text x="600" y="20" font-size="20">FINISH 🏁<\/text><text x="60" y="80" font-size="28">🏎️💨<\/text><\/svg>/' dist/racing.svg


      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4

        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
